id: merpay-switch-smoothness
name: Merpay Switch Smoothness
mode: live-site-conversion
comparison_title: Merpay Switch Smoothness
comparison_output: merpay-switch-smoothness.html
study_title: Merpay Switch Smoothness ({variant})

server:
  host: 127.0.0.1
  port: 8792
  command: ["python", "-m", "http.server", "{port}"]
  startup_timeout: 8
url_template: "http://{host}:{port}/merpay_test.html"

# Directed task: user intends to switch to Merpay. Answers Q3 (can they switch
# smoothly without confusion). Failures classify as scent / routing / form.
task: >
  You normally pay a different way, but this time you want to pay with Merpay.
  On this checkout screen, change the payment method to Merpay and continue to
  complete the order. If anything about finding or selecting Merpay is confusing
  or makes you hesitate, say what and why.
success_criteria: >
  The visitor locates the Merpay option, selects it as the payment method, and
  reaches the confirm / place-order step, or clearly explains what blocked the
  switch.

personas:
  - credit-card-default
  - paypay-wallet-user
  - konbini-cash-user
runs_per_persona: 1
driver: edsl
max_steps: 8
max_concurrent_runs: 1
keep_runs: 12
analysis_driver: local
eval_policy: report_only
animation_delay: 250
animation_max_width: 640

variants:
  - name: desktop
    device: desktop
  - name: mobile
    device: iphone

checks:
  - id: reaches_merpay_selection
    type: trace_contains
    text_any:
      - merpay
      - Merpay
    description: Visitor should locate and engage the Merpay payment option.
