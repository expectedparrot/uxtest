id: expectedparrot-conversion-path
name: Expected Parrot Demo Conversion Path
mode: live-site-conversion
comparison_title: Expected Parrot Demo Conversion Path Study
comparison_output: expectedparrot-conversion-path.html
url_template: https://www.expectedparrot.com/
study_title: Expected Parrot Demo Conversion Path ({variant})
task: >
  Starting from the Expected Parrot homepage, find the path you would use to
  schedule a demo, request access, contact the company, or take the closest
  enterprise buying next step. Continue until you reach that path or can explain
  why you are blocked.
success_criteria: >
  The visitor reaches a demo, contact, sales, signup, dashboard, or equivalent
  next-step path and can explain whether it matches demo-buying intent.
runs_per_persona: 1
driver: edsl
max_steps: 8
max_concurrent_runs: 1
keep_runs: 8
analysis_driver: local
eval_policy: report_only
animation_delay: 250
animation_max_width: 640
overrides:
  model: gpt-4o
variants:
  - name: insights-lead-desktop
    device: desktop
    personas:
      - enterprise-insights-lead
  - name: procurement-desktop
    device: desktop
    personas:
      - enterprise-procurement-lead
  - name: research-director-mobile
    device: iphone
    personas:
      - research-director
checks:
  - id: reaches_enterprise_next_step
    type: trace_contains
    text_any:
      - demo
      - contact
      - dashboard
      - get started
      - login
      - signup
    description: Visitor should encounter at least one plausible next-step path.
